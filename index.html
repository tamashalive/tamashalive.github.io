    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000000;
            color: white;
            padding: 45px 45px 45px 45px;
            font-size: 24px;
        }

        footer {
            background-color: #000000;
            color: white;
            padding: 15px 0;
            font-size: 16px;
        }

        #live-matches {
            margin: 20px;
            padding: 20px;
        }

        iframe {
            pointer-events: none;
            width: 100%;
            max-width: 1200px;
            height: auto;
            aspect-ratio: 16 / 9;
        }

        .fullscreen-button {
            position: absolute;
            background-color: #17a56b;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: -40px;
            font-size: 16px;
            border-radius: 5px;
        }

        .fullscreen-button:hover {
            background-color: #444;
        }

        .container-row {
            display: flex;
            justify-content: space-between;
            margin: 20px auto;
            max-width: 1200px;
            gap: 20px;
        }

        .section {
            overflow: visible;
            margin: 80px 20px;
        }

        .container {
            width: 33%;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .container img {
            width: 60%;
            height: auto;
            transition: transform 0.3s ease;
        }

        .container:hover img {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            header {
                font-size: 18px;
            }

            .fullscreen-button {
                padding: 8px 16px;
                font-size: 14px;
            }

            iframe {
                margin: 0 auto;
                width: 100%;
                height: auto;
            }

            #live-matches {
                padding: 10px;
                margin: 10px;
            }

            .container-row {
                flex-direction: column;
                gap: 10px;
            }

            .container {
                width: 90%;
                margin: 10px auto;
            }
        }

        @media (max-width: 480px) {
            .fullscreen-button {
                padding: 6px 12px;
                font-size: 12px;
            }

            header {
                font-size: 16px;
                padding: 10px 0;
            }

            .container h3 {
                font-size: 16px;
            }
        }
                a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>

    <script>
        function goFullscreen(iframe) {
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.mozRequestFullScreen) { // Firefox
                iframe.mozRequestFullScreen();
            } else if (iframe.webkitRequestFullscreen) { // Chrome, Safari, and Opera
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) { // IE/Edge
                iframe.msRequestFullscreen();
            }
        }
